{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Delete asset" %} · Freemium{% endblock %}

{% block content %}
<div class="card form-card" style="margin-inline:auto;max-width:460px;">
  <h1 class="card__title">{% trans "Delete this asset?" %}</h1>
  <p class="text-muted">{{ object.ticker }} — {{ object.get_asset_type_display }} · {{ object.market }}</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button class="btn btn--danger" type="submit">{% trans "Delete" %}</button>
      <a class="btn btn--ghost" href="{% url 'portfolio:asset_list' %}">{% trans "Cancel" %}</a>
    </div>
  </form>
</div>
{% endblock %}
