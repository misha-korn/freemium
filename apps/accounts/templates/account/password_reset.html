{% extends "base.html" %}
{% block title %}Reset password · Freemium{% endblock %}

{% block content %}
<div class="card form-card" style="margin-inline:auto;">
  <h1 class="card__title">Reset your password</h1>
  <p class="text-muted">Enter your email and we'll send reset instructions.</p>
  <form class="form" method="post" action="{% url 'account_reset_password' %}" novalidate>
    {% csrf_token %}
    {% include "partials/form_fields.html" %}
    <div class="form-actions">
      <button class="btn btn--primary btn--block" type="submit">Send reset email</button>
    </div>
  </form>
  <p class="text-muted mt-6"><a href="{% url 'account_login' %}">Back to log in</a></p>
</div>
{% endblock %}
