# Render Blueprint — free-tier one-click deploy (web + Postgres + Redis).
#
#   web   : Django behind Gunicorn (static via WhiteNoise)
#   db    : managed PostgreSQL (free)
#   redis : managed Key Value / Redis (Django cache + quote memoisation)
#
# Render's FREE plan has no background workers, so there is no Celery worker or
# beat service here. Instead the web service runs Celery tasks eagerly (inline):
# the "Refresh prices" button fetches quotes synchronously in the request, so it
# works with no separate worker. The periodic auto-refresh and daily digest need
# a beat scheduler and are therefore OFF on the free plan — to enable them,
# upgrade and add `worker` + `beat` services (set CELERY_TASK_ALWAYS_EAGER=False).
#
# Deploy: push to GitHub, then on Render → "New +" → "Blueprint" and pick this
# repo. DJANGO_SECRET_KEY is generated; DATABASE_URL / REDIS_URL are wired
# automatically. The Render hostname is trusted automatically
# (see config/settings/prod.py); add a custom domain to DJANGO_ALLOWED_HOSTS.

databases:
  - name: freemium-db
    databaseName: freemium
    user: freemium
    plan: free

services:
  # --- Redis / Key Value (Django cache + quote memoisation) -------------- #
  - type: redis
    name: freemium-redis
    plan: free
    maxmemoryPolicy: allkeys-lru # cache only — evict least-recently-used keys
    ipAllowList: [] # internal-only; no public access

  # --- Web (Gunicorn) ---------------------------------------------------- #
  - type: web
    name: freemium-web
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements/prod.txt && python manage.py collectstatic --no-input"
    # Free tier has no pre-deploy step, so run migrations just before Gunicorn
    # starts (idempotent; a no-op when there are no new migrations).
    startCommand: "python manage.py migrate --no-input && gunicorn config.wsgi:application --workers 3 --bind 0.0.0.0:$PORT"
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Render's hostname is trusted automatically; add custom domains here.
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: freemium-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: freemium-redis
          property: connectionString
      # No background worker on the free plan: run Celery tasks inline so the
      # "Refresh prices" button works without a separate worker process.
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      # Optional: set in the dashboard to enable error monitoring.
      - key: SENTRY_DSN
        sync: false
