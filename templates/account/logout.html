{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Log out · Freemium" %}{% endblock %}

{% block content %}
<div class="card form-card auth-card" style="margin-inline:auto;max-width:460px;">
  <h1 class="card__title">{% trans "Log out" %}</h1>
  <p class="text-muted">{% trans "Are you sure you want to log out?" %}</p>
  <form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    {% if redirect_field_value %}
      <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
    {% endif %}
    <div class="form-actions">
      <button class="btn btn--primary" type="submit">{% trans "Log out" %}</button>
      <a class="btn btn--ghost" href="{% url 'portfolio:list' %}">{% trans "Cancel" %}</a>
    </div>
  </form>
</div>
{% endblock %}
