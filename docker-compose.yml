# Local development stack. Production deploys gunicorn (see Dockerfile CMD)
# behind a reverse proxy and uses managed Postgres/Redis.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freemium
      POSTGRES_PASSWORD: freemium
      POSTGRES_DB: freemium
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freemium"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://freemium:freemium@db:5432/freemium
      REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_ALWAYS_EAGER: "False"
      DJANGO_SECRET_KEY: dev-compose-secret-change-me
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://freemium:freemium@db:5432/freemium
      REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_SECRET_KEY: dev-compose-secret-change-me
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

volumes:
  pgdata:
